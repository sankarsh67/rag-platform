upstream rag_platform_api {
    server api:8000;
}

# Define the rate limit zone here (Outside the server block, inside the file root)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Basic per-IP rate limiting, complementing DRF's per-user throttling.
    # 🛑 (Moved this line from here to the top of the file)

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        # Applying the rate limit here is perfectly valid
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://rag_platform_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
